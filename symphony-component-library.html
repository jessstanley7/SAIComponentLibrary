<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SymphonyAI — Webflow Component Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F5F4F0;--surface:#FFFFFF;--surface2:#EEECEA;--border:rgba(0,0,0,0.10);--border-strong:rgba(0,0,0,0.18);
  --text:#1A1917;--text-2:#6B6860;--text-3:#9E9B95;--radius:10px;--radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:16px;}
.wordmark{font-size:12px;font-weight:500;letter-spacing:0.08em;color:var(--text-2);text-transform:uppercase;}
.wordmark span{color:var(--text);}
.hdiv{width:1px;height:18px;background:var(--border-strong);}
.header-title{font-size:14px;font-weight:500;}
.header-badge{font-size:11px;background:var(--surface2);color:var(--text-2);padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace;}

.toolbar{padding:14px 28px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface);}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:300px;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;width:14px;height:14px;}
.search-wrap input{width:100%;padding:7px 10px 7px 32px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;}
.search-wrap input:focus{border-color:var(--text);}
select{padding:7px 26px 7px 10px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236B6860' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 9px center;}
.toolbar-stats{margin-left:auto;font-size:12px;color:var(--text-3);font-family:'DM Mono',monospace;white-space:nowrap;}

.main{padding:24px 28px 60px;}

.cat-section{margin-bottom:36px;}
.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cat-name{font-size:11px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--text-2);}
.cat-count{font-size:11px;color:var(--text-3);font-family:'DM Mono',monospace;}

.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}

.comp-card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;transition:border-color 0.12s,box-shadow 0.12s;cursor:pointer;}
.comp-card:hover{border-color:var(--border-strong);box-shadow:0 2px 12px rgba(0,0,0,0.08);}
.comp-card.is-removing{border-color:rgba(180,40,40,0.15);}
.comp-card.is-removing .card-screenshot{background:#FDF4F4;}

.card-screenshot{width:100%;aspect-ratio:16/9;background:var(--surface2);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;}
.card-screenshot img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;}
.screenshot-placeholder{color:var(--text-3);font-size:11px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;}
.screenshot-placeholder svg{opacity:0.3;width:22px;height:22px;}
.hover-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.12s,background 0.12s;}
.comp-card:hover .hover-overlay{opacity:1;background:rgba(0,0,0,0.30);}
.hover-inner{background:white;border-radius:7px;padding:6px 14px;font-size:12px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:5px;}

.card-body{padding:12px 14px;}
.card-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;line-height:1.35;}
.card-slug{font-size:10px;color:var(--text-3);font-family:'DM Mono',monospace;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-meta{display:flex;align-items:center;gap:5px;margin-bottom:9px;flex-wrap:wrap;}
.usage-count{font-size:11px;color:var(--text-3);font-family:'DM Mono',monospace;}
.cat-pill{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap;}

/* ── TWO-TAG ROW ── */
.card-tags{display:flex;gap:6px;margin-bottom:8px;align-items:center;}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;border:1px solid;white-space:nowrap;cursor:pointer;transition:opacity 0.1s;}
.tag:hover{opacity:0.75;}
.tag svg{width:11px;height:11px;flex-shrink:0;}

/* Migration tag */
.tag-migrating{background:#E6F5ED;color:#156635;border-color:#A8D9BB;}
.tag-removing{background:#FEF2F2;color:#991515;border-color:#ECA0A0;}
.tag-unset-migration{background:var(--surface2);color:var(--text-3);border-color:var(--border-strong);border-style:dashed;}

/* Status tag */
.tag-working{background:#EEF4FF;color:#1A4A8A;border-color:#A0B8F0;}
.tag-needs-fix{background:#FFF8E6;color:#7A4200;border-color:#F0C060;}
.tag-unset-status{background:var(--surface2);color:var(--text-3);border-color:var(--border-strong);border-style:dashed;}

.card-note{font-size:12px;color:var(--text-2);line-height:1.5;margin-bottom:8px;font-style:italic;padding:6px 8px;background:var(--surface2);border-radius:6px;}

.card-footer{display:flex;align-items:center;justify-content:space-between;}
.edit-btn{font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid var(--border-strong);background:transparent;color:var(--text-2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.1s;}
.edit-btn:hover{background:var(--surface2);color:var(--text);}

/* ── MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:520px;border:1px solid var(--border);max-height:90vh;overflow-y:auto;}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;}
.modal-title{font-size:15px;font-weight:500;}
.modal-sub{font-size:11px;color:var(--text-3);margin-top:2px;font-family:'DM Mono',monospace;}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:18px;line-height:1;padding:2px;}
.close-btn:hover{color:var(--text);}
.modal-body{padding:18px 22px;display:flex;flex-direction:column;gap:16px;}
.field-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-2);margin-bottom:6px;}

/* tag toggle groups in modal */
.tag-group{display:flex;gap:8px;}
.tag-toggle{flex:1;padding:10px 12px;border-radius:var(--radius);border:1.5px solid var(--border-strong);cursor:pointer;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text-2);text-align:center;transition:all 0.12s;}
.tag-toggle:hover{background:var(--surface2);}
.tag-toggle.active-migrating{background:#E6F5ED;color:#156635;border-color:#A8D9BB;}
.tag-toggle.active-removing{background:#FEF2F2;color:#991515;border-color:#ECA0A0;}
.tag-toggle.active-working{background:#EEF4FF;color:#1A4A8A;border-color:#A0B8F0;}
.tag-toggle.active-needs-fix{background:#FFF8E6;color:#7A4200;border-color:#F0C060;}

.screenshot-drop{border:1.5px dashed var(--border-strong);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:border-color 0.12s,background 0.12s;position:relative;}
.screenshot-drop:hover,.screenshot-drop.drag-over{border-color:var(--text);background:var(--surface2);}
.screenshot-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.screenshot-drop p{font-size:13px;color:var(--text-2);}
.screenshot-drop .drop-hint{font-size:11px;color:var(--text-3);margin-top:3px;}
.screenshot-preview{width:100%;border-radius:8px;margin-top:10px;display:block;border:1px solid var(--border);}
textarea{width:100%;padding:9px 11px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;resize:vertical;min-height:75px;outline:none;line-height:1.5;}
textarea:focus{border-color:var(--text);}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.btn-primary{background:var(--text);color:white;border:none;padding:8px 18px;border-radius:var(--radius);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;}
.btn-primary:hover{opacity:0.85;}
.btn-secondary{background:transparent;color:var(--text-2);border:1px solid var(--border-strong);padding:7px 14px;border-radius:var(--radius);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;}
.btn-secondary:hover{background:var(--surface2);}
.btn-ghost-danger{background:transparent;color:#991515;border:none;padding:7px 0;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;text-decoration:underline;text-underline-offset:2px;}
.btn-ghost-danger:hover{opacity:0.7;}

.saving-toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:white;padding:9px 15px;border-radius:var(--radius);font-size:12px;font-family:'DM Mono',monospace;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:300;}
.saving-toast.show{opacity:1;}
.hidden{display:none!important;}
.empty-state{padding:48px;text-align:center;color:var(--text-3);font-size:14px;}
.modal-section-title{font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.modal-section-title::after{content:'';flex:1;height:1px;background:var(--border);}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="wordmark"><span>SymphonyAI</span> × Baunfire</span>
    <div class="hdiv"></div>
    <span class="header-title">Webflow Component Library</span>
  </div>
  <span class="header-badge" id="header-badge">141 components</span>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search components…" oninput="filterCards()">
  </div>
  <select id="catFilter" onchange="filterCards()">
    <option value="">All categories</option>
    <option value="hero">Hero</option>
    <option value="cta">CTA</option>
    <option value="content">Content</option>
    <option value="cards">Cards & lists</option>
    <option value="resources">Resources</option>
    <option value="logos">Logos</option>
    <option value="media">Media & sliders</option>
    <option value="data">Data & social proof</option>
    <option value="utility">Utility</option>
  </select>
  <select id="migFilter" onchange="filterCards()">
    <option value="">Migrating & removing</option>
    <option value="migrating">Migrating</option>
    <option value="removing">Removing</option>
  </select>
  <select id="statusFilter" onchange="filterCards()">
    <option value="">Working & needs fix</option>
    <option value="working">Working</option>
    <option value="needs-fix">Needs fix</option>
  </select>
  <span class="toolbar-stats" id="toolbar-stats">141 shown</span>
</div>

<div class="main" id="main-content"></div>
<div class="saving-toast" id="saving-toast">Saved</div>

<!-- MODAL -->
<div class="modal-backdrop hidden" id="modal" onclick="handleBackdropClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-sub" id="modal-sub"></div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <div>
        <div class="modal-section-title">Migration</div>
        <div class="tag-group">
          <button class="tag-toggle" id="tog-migrating" onclick="setMig('migrating')">Migrating</button>
          <button class="tag-toggle" id="tog-removing"  onclick="setMig('removing')">Removing</button>
        </div>
      </div>

      <div>
        <div class="modal-section-title">Status</div>
        <div class="tag-group">
          <button class="tag-toggle" id="tog-working"   onclick="setStat('working')">Working</button>
          <button class="tag-toggle" id="tog-needs-fix" onclick="setStat('needs-fix')">Needs fix</button>
        </div>
      </div>

      <div>
        <div class="modal-section-title">Notes</div>
        <textarea id="notes-input" placeholder="e.g. Light mode only — works on solution pages, broken on homepage. Dev to fix before handoff."></textarea>
      </div>

      <div>
        <div class="modal-section-title">Screenshot</div>
        <div class="screenshot-drop" id="drop-zone">
          <input type="file" accept="image/*" id="file-input" onchange="handleFileSelect(event)">
          <p>Drop screenshot here or click to upload</p>
          <p class="drop-hint">PNG, JPG, WebP · any size</p>
        </div>
        <img id="preview-img" class="screenshot-preview hidden" src="" alt="">
        <button class="btn-ghost-danger" id="remove-screenshot-btn" style="display:none;margin-top:6px;" onclick="removeScreenshot()">Remove screenshot</button>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveCard()">Save</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'symphony-components-v3';

const CAT_META = {
  hero:     {label:'Hero',            color:'#2D5FA8',bg:'#EEF3FC'},
  cta:      {label:'CTA',             color:'#1A7A4A',bg:'#E6F5ED'},
  content:  {label:'Content',         color:'#6B3FA0',bg:'#F3EEFF'},
  cards:    {label:'Cards & lists',   color:'#B0396A',bg:'#FCEEF4'},
  resources:{label:'Resources',       color:'#A05A00',bg:'#FFF4E6'},
  logos:    {label:'Logos',           color:'#2A7A5A',bg:'#E6F5F0'},
  media:    {label:'Media & sliders', color:'#4A4845',bg:'#EEECEA'},
  data:     {label:'Data & social',   color:'#A03030',bg:'#FCEAEA'},
  utility:  {label:'Utility',         color:'#5A5A5A',bg:'#F0EEE8'},
  microsoft:{label:'Microsoft',       color:'#0068B8',bg:'#E5F1FB'},
};

const MIG_META = {
  'migrating': {label:'Migrating', cls:'tag-migrating'},
  'removing':  {label:'Removing',  cls:'tag-removing'},
};
const STAT_META = {
  'working':   {label:'Working',    cls:'tag-working'},
  'needs-fix': {label:'Needs fix',  cls:'tag-needs-fix'},
};

const COMPONENTS = [{"id":"assessment-entries","name":"Assessment Entries","slug":"acf/assessment-entries","cat":"utility","keepPages":1,"removePages":0,"status":"keep"},{"id":"assessment-tool","name":"Assessment Tool","slug":"acf/assessment-tool","cat":"utility","keepPages":0,"removePages":0,"status":"keep"},{"id":"assessment-tool-results","name":"Assessment Tool Results","slug":"acf/assessment-tool-results","cat":"utility","keepPages":0,"removePages":0,"status":"keep"},{"id":"cta-section-2","name":"CTA Section 2","slug":"acf/cta-section-2","cat":"cta","keepPages":0,"removePages":0,"status":"keep"},{"id":"domains","name":"Domains","slug":"acf/domains","cat":"utility","keepPages":0,"removePages":0,"status":"keep"},{"id":"doughnut-chart","name":"Doughnut Chart","slug":"acf/doughnut-chart","cat":"utility","keepPages":0,"removePages":0,"status":"keep"},{"id":"assessment-tool-maturity-gap","name":"Assessment Tool Maturity Gap","slug":"acf/maturity-gap","cat":"utility","keepPages":0,"removePages":0,"status":"keep"},{"id":"score","name":"Score","slug":"acf/score","cat":"utility","keepPages":0,"removePages":0,"status":"keep"},{"id":"shadow-container","name":"Shadow Container","slug":"acf/shadow-container","cat":"utility","keepPages":0,"removePages":0,"status":"keep"},{"id":"steps-block","name":"Steps Block","slug":"acf/steps","cat":"data","keepPages":0,"removePages":0,"status":"keep"},{"id":"confirmation-message","name":"Confirmation Message","slug":"acf/confirmation-message","cat":"cta","keepPages":1,"removePages":0,"status":"keep"},{"id":"contact-form","name":"Contact Form","slug":"acf/contact-form","cat":"cta","keepPages":0,"removePages":0,"status":"keep"},{"id":"cta-block","name":"CTA Block","slug":"acf/cta","cat":"cta","keepPages":0,"removePages":0,"status":"keep"},{"id":"cta-section","name":"CTA Section","slug":"acf/cta-section","cat":"cta","keepPages":0,"removePages":0,"status":"keep"},{"id":"events-block","name":"Events Block","slug":"acf/husl-events","cat":"resour let cardData = {};
let currentEdit = null;
let currentImg = null;
let editMig = null;
let editStat = null;
let saveTimer = null;

function defaultMig(comp) {
  return (comp.status === 'remove-only' || comp.status === 'unused') ? 'removing' : null;
}

async function loadData() {
  try {
    const r = await window.storage.get(STORAGE_KEY, true);
    if (r && r.value) cardData = JSON.parse(r.value);
  } catch(e) { cardData = {}; }
  // Seed defaults for remove-only/unused
  COMPONENTS.forEach(c => {
    if (!cardData[c.id] && defaultMig(c)) {
      cardData[c.id] = {mig: defaultMig(c), stat: null, note: '', img: null};
    }
  });
  render();
}

async function saveData() {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(cardData), true);
    showToast('Saved');
  } catch(e) { showToast('Error saving'); }
}

function showToast(msg) {
  const el = document.getElementById('saving-toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

const CAT_ORDER = ['hero','cta','content','cards','resources','logos','media','data','utility','microsoft'];

function render() {
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  const catF = document.getElementById('catFilter')?.value || '';
  const migF = document.getElementById('migFilter')?.value || '';
  const statF = document.getElementById('statusFilter')?.value || '';
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  let total = 0;

  CAT_ORDER.forEach(cat => {
    if (!CAT_META[cat]) return;
    const comps = COMPONENTS.filter(c => {
      if (c.cat !== cat) return false;
      if (catF && c.cat !== catF) return false;
      if (q && !c.name.toLowerCase().includes(q) && !c.slug.toLowerCase().includes(q)) return false;
      const d = cardData[c.id] || {};
      const mig = d.mig || defaultMig(c);
      const stat = d.stat || null;
      if (migF && mig !== migF) return false;
      if (statF && stat !== statF) return false;
      return true;
    });
    if (!comps.length) return;
    total += comps.length;

    const sec = document.createElement('div');
    sec.className = 'cat-section';
    const cm = CAT_META[cat];
    sec.innerHTML = `<div class="cat-header"><div class="cat-dot" style="background:${cm.color}"></div><span class="cat-name">${cm.label}</span><span class="cat-count">${comps.length}</span></div><div class="comp-grid" id="grid-${cat}"></div>`;
    main.appendChild(sec);
    const grid = sec.querySelector(`#grid-${cat}`);
    comps.forEach(c => grid.appendChild(buildCard(c)));
  });

  document.getElementById('toolbar-stats').textContent = `${total} shown`;
  if (!total) main.innerHTML = '<div class="empty-state">No components match your filters.</div>';
}

function buildCard(comp) {
  const d = cardData[comp.id] || {};
  const mig = d.mig || defaultMig(comp);
  const stat = d.stat || null;
  const note = d.note || '';
  const img = d.img || null;
  const cm = CAT_META[comp.cat] || CAT_META.utility;
  const isRemoving = mig === 'removing';

  const card = document.createElement('div');
  card.className = 'comp-card' + (isRemoving ? ' is-removing' : '');

  const migMeta = mig ? MIG_META[mig] : null;
  const statMeta = stat ? STAT_META[stat] : null;

  const migTag = migMeta
    ? `<span class="tag ${migMeta.cls}">${migMeta.label}</span>`
    : `<span class="tag tag-unset-migration" onclick="openModal('${comp.id}')">+ Migration</span>`;

  const statTag = statMeta
    ? `<span class="tag ${statMeta.cls}">${statMeta.label}</span>`
    : `<span class="tag tag-unset-status" onclick="openModal('${comp.id}')">+ Status</span>`;

  const usageHtml = (comp.keepPages + comp.removePages) > 0
    ? `<span class="usage-count">×${comp.keepPages}K / ×${comp.removePages}R</span>`
    : '';

  card.innerHTML = `
    <div class="card-screenshot">
      ${img
        ? `<img src="${img}" alt="${comp.name}" loading="lazy">`
        : `<div class="screenshot-placeholder"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>No screenshot</span></div>`}
      <div class="hover-overlay"><div class="hover-inner"><svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit</div></div>
    </div>
    <div class="card-body">
      <div class="card-name">${comp.name}</div>
      ${comp.slug ? `<div class="card-slug">${comp.slug}</div>` : ''}
      <div class="card-meta">
        <span class="cat-pill" style="background:${cm.bg};color:${cm.color}">${cm.label}</span>
        ${usageHtml}
      </div>
      <div class="card-tags">${migTag}${statTag}</div>
      ${note ? `<div class="card-note">${note}</div>` : ''}
      <div class="card-footer"><button class="edit-btn" onclick="openModal('${comp.id}')">Edit</button></div>
    </div>`;

  card.querySelector('.card-screenshot').addEventListener('click', () => openModal(comp.id));
  return card;
}

function openModal(id) {
  currentEdit = id;
  const comp = COMPONENTS.find(c => c.id === id);
  const d = cardData[id] || {};
  editMig  = d.mig  || defaultMig(comp);
  editStat = d.stat || null;
  currentImg = d.img || null;
  const cm = CAT_META[comp.cat] || CAT_META.utility;

  document.getElementById('modal-title').textContent = comp.name;
  document.getElementById('modal-sub').textContent = `${comp.slug} · ${cm.label}`;
  document.getElementById('notes-input').value = d.note || '';

  const preview = document.getElementById('preview-img');
  const removeBtn = document.getElementById('remove-screenshot-btn');
  if (currentImg) { preview.src = currentImg; preview.classList.remove('hidden'); removeBtn.style.display = 'block'; }
  else { preview.src = ''; preview.classList.add('hidden'); removeBtn.style.display = 'none'; }

  updateToggleUI();
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('file-input').value = '';
}

function updateToggleUI() {
  const ids = ['migrating','removing','working','needs-fix'];
  ids.forEach(id => {
    const el = document.getElementById('tog-' + id);
    el.className = 'tag-toggle';
    if ((id === editMig) || (id === editStat)) {
      el.classList.add('active-' + id);
    }
  });
}

function setMig(val) {
  editMig = editMig === val ? null : val;
  updateToggleUI();
}
function setStat(val) {
  editStat = editStat === val ? null : val;
  updateToggleUI();
}

function handleBackdropClick(e) { if (e.target.id === 'modal') closeModal(); }
function closeModal() { document.getElementById('modal').classList.add('hidden'); currentEdit = null; currentImg = null; }

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    currentImg = ev.target.result;
    const p = document.getElementById('preview-img');
    p.src = currentImg; p.classList.remove('hidden');
    document.getElementById('remove-screenshot-btn').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function removeScreenshot() {
  currentImg = null;
  document.getElementById('preview-img').classList.add('hidden');
  document.getElementById('remove-screenshot-btn').style.display = 'none';
}

function saveCard() {
  if (!currentEdit) return;
  cardData[currentEdit] = {
    mig: editMig,
    stat: editStat,
    note: document.getElementById('notes-input').value.trim(),
    img: currentImg
  };
  saveData();
  closeModal();
  render();
}

function filterCards() { render(); }

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file?.type.startsWith('image/')) {
    const r = new FileReader();
    r.onload = ev => {
      currentImg = ev.target.result;
      const p = document.getElementById('preview-img');
      p.src = currentImg; p.classList.remove('hidden');
      document.getElementById('remove-screenshot-btn').style.display = 'block';
    };
    r.readAsDataURL(file);
  }
});

loadData();
</script>
</body>
</html>
